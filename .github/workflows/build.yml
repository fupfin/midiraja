name: Cross-Platform Build & Test

on:
  push:
    branches:
      - master
      - main
      - codex/**
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch_name: linux-amd64
          - os: ubuntu-24.04-arm
            arch_name: linux-arm64
          - os: macos-15
            arch_name: darwin-arm64
          - os: windows-2022
            arch_name: windows-amd64

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup GraalVM (Java 25)
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '25'
        distribution: 'graalvm-community'
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install Linux native build dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        # Install native deps required by src/main/c/audiolib and src/main/c/mediakeys
        sudo apt-get install -y libasound2-dev libdbus-1-dev pkg-config
        # Attempt to load the virtual ALSA sequencer module (requires sudo)
        sudo modprobe snd-virmidi || sudo modprobe snd-dummy || echo "Kernel module load failed, relying on user-space ALSA."

    - name: Build C/C++ Native Libraries
      if: runner.os != 'Windows' # Skip automated windows C++ build for now, focus on Unix
      run: ./scripts/build-native-libs.sh

    - name: Build JVM Classes
      run: ./gradlew classes

    - name: Run Unit Tests
      run: ./gradlew test

    - name: Compile Native Image
      run: ./gradlew nativeCompile

    - name: Upload Native Binary
      uses: actions/upload-artifact@v4
      with:
        name: midra-${{ matrix.arch_name }}
        path: |
          build/native/nativeCompile/midra
          build/native/nativeCompile/midra.exe
