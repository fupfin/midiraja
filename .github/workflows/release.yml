name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: midraja
            asset_name: midraja-linux-amd64
          - os: macos-latest
            artifact_name: midraja
            asset_name: midraja-darwin-arm64
          - os: windows-latest
            artifact_name: midraja.exe
            asset_name: midraja-windows-amd64.exe

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        
      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew
        
      - name: Build Native Image
        run: ./gradlew nativeCompile

      - name: Rename Artifact
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            mv build/native/nativeCompile/${{ matrix.artifact_name }} ${{ matrix.asset_name }}
          else
            mv build/native/nativeCompile/${{ matrix.artifact_name }} ${{ matrix.asset_name }}
          fi
        shell: bash

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
